<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>庫存管理</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <span class="header-icon">📦</span>
  <h1>庫存管理</h1>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('inventory', event)">庫存總覽</button>
    <button class="tab" onclick="switchTab('deduct', event)">揀貨扣減</button>
    <button class="tab" onclick="switchTab('log', event)">操作記錄</button>
  </div>

  <!-- 庫存總覽 -->
  <div id="panel-inventory" class="panel active">
    <div class="stats">
      <div class="stat">
        <div class="stat-icon blue">📦</div>
        <div class="stat-body"><div class="num" id="stat-total">0</div><div class="label">SKU 總數</div></div>
      </div>
      <div class="stat">
        <div class="stat-icon red">⚠️</div>
        <div class="stat-body"><div class="num red" id="stat-low">0</div><div class="label">庫存不足（&lt;10）</div></div>
      </div>
      <div class="stat">
        <div class="stat-icon green">🗂️</div>
        <div class="stat-body"><div class="num" id="stat-units">0</div><div class="label">總庫存件數</div></div>
      </div>
    </div>

    <div id="alert-container"></div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="margin:0">庫存列表</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline" onclick="document.getElementById('import-file').click()">📥 導入庫存</button>
          <input type="file" id="import-file" onchange="importInventory(event)">
          <button class="btn btn-outline" onclick="exportInventory()">📤 導出庫存</button>
          <button class="btn btn-danger" onclick="clearInventory()">清空</button>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索 SKU 或貨架號..." oninput="renderInventory()">
      </div>
      <div id="inventory-table-container">
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>還沒有庫存數據</p>
          <p style="margin-top:8px;font-size:13px;">從領星導出 CSV/Excel 後點擊「導入庫存」</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 揀貨扣減 -->
  <div id="panel-deduct" class="panel">
    <div class="card">
      <h2>上傳揀貨單</h2>
      <div class="upload-area" id="upload-area"
           onclick="document.getElementById('picking-file').click()"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event)">
        <div class="icon">📄</div>
        <p><strong>點擊上傳</strong>或拖拽文件到此處</p>
        <p style="margin-top:4px;">支持 PDF、JPG、PNG</p>
      </div>
      <input type="file" id="picking-file" accept=".pdf,.jpg,.jpeg,.png" onchange="handlePickingFile(event)">

      <div style="margin-top:20px;">
        <h2>手動輸入</h2>
        <p style="font-size:13px;color:#6b7280;margin-bottom:12px;">也可以直接輸入 SKU 和數量</p>
        <div id="manual-rows">
          <div class="manual-row">
            <input class="sku-input" type="text" placeholder="SKU">
            <input class="qty-input" type="number" placeholder="數量" min="1">
            <button class="rm-btn" onclick="removeManualRow(this)">×</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn btn-outline" onclick="addManualRow()">+ 新增一行</button>
          <button class="btn btn-primary" onclick="previewManual()">預覽扣減</button>
        </div>
      </div>
    </div>
    <div id="result-container"></div>
  </div>

  <!-- 操作記錄 -->
  <div id="panel-log" class="panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="margin:0">操作記錄</h2>
        <button class="btn btn-outline" onclick="clearLog()">清空記錄</button>
      </div>
      <div id="log-container">
        <div class="empty-state"><div class="icon">📝</div><p>還沒有操作記錄</p></div>
      </div>
    </div>
  </div>
</div>

<!-- 編輯 Modal -->
<div id="edit-modal" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">編輯 SKU</h3>
    <label>庫存數量</label>
    <input id="modal-qty" type="number" min="0">
    <label>貨架號 <span style="font-weight:400;color:#9ca3af">（多個用逗號分隔）</span></label>
    <input id="modal-shelves" type="text" placeholder="例如：A01, B03, C12">
    <p class="modal-hint">揀貨單上傳後會自動更新貨架號，也可以在這裡手動新增</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="document.getElementById('edit-modal').style.display='none'">取消</button>
      <button class="btn btn-primary" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<script src="js/store.js"></script>
<script src="js/log.js"></script>
<script src="js/ui.js"></script>
<script src="js/import.js"></script>
<script src="js/inventory.js"></script>
<script src="js/parser.js"></script>
<script src="js/deduct.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  updateStats(); renderInventory(); renderAlerts();
</script>
</body>
</html>
